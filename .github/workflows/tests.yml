name: Tests

on:
    push:
    pull_request:

permissions:
    contents: read

concurrency:
    group: tests-${{ github.ref }}
    cancel-in-progress: true

jobs:
    rust:
        name: Build + Rust tests (unit + LiteSVM)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@1.89.0

            - name: Cache cargo
              uses: Swatinem/rust-cache@v2

            - name: Cache Solana CLI
              id: solana-cache
              uses: actions/cache@v4
              with:
                  path: ~/.local/share/solana
                  key: solana-${{ runner.os }}-3.1.14

            - name: Install Solana CLI
              if: steps.solana-cache.outputs.cache-hit != 'true'
              run: |
                  sh -c "$(curl -sSfL https://release.anza.xyz/v3.1.14/install)"

            - name: Add Solana to PATH
              run: |
                  echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

            - name: Cache AVM + Anchor
              id: anchor-cache
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.avm
                      ~/.cargo/bin/anchor
                      ~/.cargo/bin/avm
                  key: anchor-${{ runner.os }}-1.0.2

            - name: Install Anchor
              if: steps.anchor-cache.outputs.cache-hit != 'true'
              run: |
                  cargo install --git https://github.com/solana-foundation/anchor --tag v0.32.1 avm --force
                  avm install 1.0.2

            - name: Select Anchor Version
              run: |
                  avm use 1.0.2
                  anchor --version

            - name: Generate keypair
              run: |
                  anchor keys sync

            - name: Build .so + IDL
              run: |
                  anchor build

            - name: Rust tests (lib + LiteSVM integration)
              run: anchor run testall

            - name: Upload program artifact (.so + IDL)
              uses: actions/upload-artifact@v4
              with:
                  name: program-build
                  path: |
                      target/deploy/bastion.so
                      target/idl/bastion.json
                      target/deploy/bastion-keypair.json
                  retention-days: 1
                  if-no-files-found: error

    sdk-bot:
        name: SDK & Bot tests
        needs: rust
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Download program artifact
              uses: actions/download-artifact@v4
              with:
                  name: program-build
                  path: target

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 11.2.2

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Get pnpm store path
              id: pnpm-store
              run: |
                  echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

            - name: Cache pnpm store
              uses: actions/cache@v4
              with:
                  path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
                  key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: |
                      pnpm-store-${{ runner.os }}-

            - name: Cache turbo
              uses: actions/cache@v4
              with:
                  path: .turbo
                  key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', '**/package.json') }}
                  restore-keys: |
                      turbo-${{ runner.os }}-${{ github.ref_name }}-
                      turbo-${{ runner.os }}-

            - name: Install deps
              run: |
                  pnpm install --frozen-lockfile

            - name: Build SDK
              run: |
                  pnpm build

            - name: SDK typecheck + tests
              run: |
                  pnpm typecheck
                  pnpm test

    e2e:
        name: E2E (local validator)
        needs: rust
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Download program artifact
              uses: actions/download-artifact@v4
              with:
                  name: program-build
                  path: target

            - name: Cache Solana CLI
              id: solana-cache
              uses: actions/cache@v4
              with:
                  path: ~/.local/share/solana
                  key: solana-${{ runner.os }}-3.1.14

            - name: Install Solana CLI
              if: steps.solana-cache.outputs.cache-hit != 'true'
              run: |
                  sh -c "$(curl -sSfL https://release.anza.xyz/v3.1.14/install)"

            - name: Add Solana to PATH
              run: |
                  echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 11.2.2

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Get pnpm store path
              id: pnpm-store
              run: |
                  echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

            - name: Cache pnpm store
              uses: actions/cache@v4
              with:
                  path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
                  key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
                  restore-keys: |
                      pnpm-store-${{ runner.os }}-

            - name: Cache turbo
              uses: actions/cache@v4
              with:
                  path: .turbo
                  key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', '**/package.json') }}
                  restore-keys: |
                      turbo-${{ runner.os }}-${{ github.ref_name }}-
                      turbo-${{ runner.os }}-

            - name: Install deps + build SDK
              run: |
                  pnpm install --frozen-lockfile
                  pnpm -F bastion build

            - name: Run validator + e2e
              run: |
                  PROGRAM_ID=$(solana address -k target/deploy/bastion-keypair.json)

                  echo "Program ID: $PROGRAM_ID"

                  solana-test-validator --reset \
                    --ledger /tmp/ledger \
                    --bpf-program "$PROGRAM_ID" target/deploy/bastion.so \
                    --rpc-port 8899 > /tmp/validator.log 2>&1 &

                  echo "waiting for validator..."
                  for i in $(seq 1 60); do
                    if solana cluster-version -u http://127.0.0.1:8899 >/dev/null 2>&1; then
                      echo "validator ready after ${i}s"
                      break
                    fi
                    sleep 1
                  done

                  RPC_URL=http://127.0.0.1:8899 \
                  WS_URL=ws://127.0.0.1:8900 \
                  PROGRAM_ID=$PROGRAM_ID \
                  pnpm -F @examples/bot exec tsx scripts/e2e-live.ts
